name: Playwright tests

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm install
      - name: Run Playwright
        id: playwright
        shell: bash
        run: |
          set +e
          npm test 2>&1 | tee playwright-output.txt
          result=${PIPESTATUS[0]}
          echo "exit_code=$result" >> "$GITHUB_OUTPUT"
          grep -m1 -E "Error:|failed|Timeout" playwright-output.txt | sed 's/^[[:space:]]*//' | cut -c1-120 > playwright-summary.txt || true
          if [ ! -s playwright-summary.txt ]; then echo "Playwright exited with code $result" > playwright-summary.txt; fi
          exit 0
      - uses: actions/upload-artifact@v4
        if: steps.playwright.outputs.exit_code != '0'
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            playwright-output.txt
          retention-days: 7
      - name: Publish Playwright status and diagnostics
        uses: actions/github-script@v7
        env:
          EXIT_CODE: ${{ steps.playwright.outputs.exit_code }}
        with:
          script: |
            const fs = require('fs');
            const passed = process.env.EXIT_CODE === '0';
            const detail = passed ? 'Desktop and mobile browser tests passed' : fs.readFileSync('playwright-summary.txt', 'utf8').trim();
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: passed ? 'success' : 'failure',
              context: 'playwright-tests',
              description: detail.slice(0, 140),
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions`
            });
            if (!passed) {
              const output = fs.readFileSync('playwright-output.txt', 'utf8');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Playwright failure ${context.sha.slice(0, 7)}`,
                body: `Automated diagnostic for commit ${context.sha}.\n\n\`\`\`text\n${output.slice(-12000)}\n\`\`\``
              });
            }
      - name: Fail workflow when tests fail
        if: steps.playwright.outputs.exit_code != '0'
        run: exit 1
