name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Prepare site
        run: |
          mkdir _site
          cp index.html styles.css app.js guide.md 404.html .nojekyll _site/
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Curl deployed website until available
        env:
          PAGE_URL: ${{ needs.deploy.outputs.page_url }}
        run: |
          for attempt in $(seq 1 36); do
            echo "Attempt $attempt: $PAGE_URL"
            if curl --fail --silent --show-error --location "$PAGE_URL" --output page.html \
              && grep --quiet "Android: Netrunner (2012)" page.html; then
              echo "Website returned the expected page."
              exit 0
            fi
            sleep 5
          done
          echo "Website did not return the expected page."
          exit 1
      - name: Publish live-site commit status
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              context: 'pages-live',
              description: 'Public site returned the expected HTML',
              target_url: '${{ needs.deploy.outputs.page_url }}'
            });
