<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc"><title id="title">Remote server layout</title><desc id="desc">Two remote servers, each containing one agenda or asset plus upgrades and protected by a vertical column of sideways ICE.</desc><defs><style>.bg{fill:#071019}.panel{fill:#0d1823;stroke:#39e6ff;stroke-width:2}.root{fill:#171323;stroke:#ff5bc8;stroke-width:2}.card{fill:#102536;stroke:#baf7ff;stroke-width:2}.up{fill:#211426;stroke:#ff5bc8;stroke-width:2}.ice{fill:#102536;stroke:#39e6ff;stroke-width:3}.h{fill:#edf8ff;font:900 34px system-ui,sans-serif}.t{fill:#edf8ff;font:700 22px system-ui,sans-serif}.s{fill:#39e6ff;font:700 18px system-ui,sans-serif}.m{fill:#a9c0ce;font:17px system-ui,sans-serif}.p{fill:#ff5bc8;font:700 18px system-ui,sans-serif}.line{stroke:#39e6ff;stroke-width:3;fill:none}.dash{stroke:#39e6ff;stroke-width:3;stroke-dasharray:8 8}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0 0v6l9-3z" fill="#39e6ff"/></marker></defs><rect class="bg" width="1200" height="800"/><rect x="18" y="18" width="1164" height="764" rx="18" fill="none" stroke="#39e6ff" stroke-width="2"/><text x="600" y="58" text-anchor="middle" class="h">REMOTE SERVER LAYOUT</text><g transform="translate(60 90)"><rect class="panel" width="470" height="590" rx="14"/><text x="235" y="44" text-anchor="middle" class="h">REMOTE SERVER A</text><rect class="root" x="32" y="72" width="406" height="210" rx="10"/><text x="235" y="104" text-anchor="middle" class="p">SERVER CONTENT</text><rect class="card" x="75" y="125" width="92" height="128" rx="7"/><text x="121" y="267" text-anchor="middle" class="m">one agenda</text><text x="121" y="288" text-anchor="middle" class="m">or one asset</text><line x1="210" y1="120" x2="210" y2="258" stroke="#ff5bc8" stroke-width="2"/><text x="320" y="145" text-anchor="middle" class="p">any number of upgrades</text><rect class="up" x="240" y="170" width="54" height="78" rx="5"/><rect class="up" x="310" y="170" width="54" height="78" rx="5"/><rect class="up" x="380" y="170" width="54" height="78" rx="5"/><text x="235" y="322" text-anchor="middle" class="s">PROTECTING ICE</text><path class="line" d="M235 282V545"/><rect class="ice" x="148" y="340" width="174" height="48" rx="7"/><rect class="ice" x="148" y="408" width="174" height="48" rx="7"/><rect class="ice" x="148" y="476" width="174" height="48" rx="7"/><path class="dash" d="M235 524V568" marker-end="url(#arrow)"/></g><g transform="translate(560 90)"><rect class="panel" width="470" height="590" rx="14"/><text x="235" y="44" text-anchor="middle" class="h">REMOTE SERVER B</text><rect class="root" x="32" y="72" width="406" height="210" rx="10"/><text x="235" y="104" text-anchor="middle" class="p">SERVER CONTENT</text><rect class="card" x="75" y="125" width="92" height="128" rx="7"/><text x="121" y="267" text-anchor="middle" class="m">one agenda</text><text x="121" y="288" text-anchor="middle" class="m">or one asset</text><line x1="210" y1="120" x2="210" y2="258" stroke="#ff5bc8" stroke-width="2"/><text x="320" y="145" text-anchor="middle" class="p">any number of upgrades</text><rect class="up" x="240" y="170" width="54" height="78" rx="5"/><rect class="up" x="310" y="170" width="54" height="78" rx="5"/><rect class="up" x="380" y="170" width="54" height="78" rx="5"/><text x="235" y="322" text-anchor="middle" class="s">PROTECTING ICE</text><path class="line" d="M235 282V545"/><rect class="ice" x="148" y="340" width="174" height="48" rx="7"/><rect class="ice" x="148" y="408" width="174" height="48" rx="7"/><rect class="ice" x="148" y="476" width="174" height="48" rx="7"/><path class="dash" d="M235 524V568" marker-end="url(#arrow)"/></g><rect x="240" y="700" width="720" height="62" rx="12" class="panel"/><text x="600" y="742" text-anchor="middle" class="h">RUNNER</text><g transform="translate(1045 120)"><text class="s">KEY POINTS</text><text y="42" class="m">• one agenda or one asset</text><text y="72" class="m">• any number of upgrades</text><text y="102" class="m">• any amount of ICE</text><text y="132" class="m">• ICE may protect an empty server</text></g></svg>