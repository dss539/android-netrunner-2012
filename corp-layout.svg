<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
<title id="title">Corporation-side table layout</title><desc id="desc">HQ, R and D, and Archives as separate server columns, each with a root and a vertical column of sideways ICE extending toward the Runner.</desc>
<defs><style>.bg{fill:#071019}.panel{fill:#0d1823;stroke:#39e6ff;stroke-width:2}.root{fill:#171323;stroke:#ff5bc8;stroke-width:2}.card{fill:#102536;stroke:#baf7ff;stroke-width:2}.ice{fill:#102536;stroke:#39e6ff;stroke-width:3}.t{fill:#edf8ff;font:700 24px system-ui,sans-serif}.h{fill:#edf8ff;font:900 34px system-ui,sans-serif}.s{fill:#39e6ff;font:700 18px system-ui,sans-serif}.m{fill:#a9c0ce;font:16px system-ui,sans-serif}.pink{fill:#ff5bc8;font:700 16px system-ui,sans-serif}.line{stroke:#39e6ff;stroke-width:3;fill:none}.dash{stroke:#39e6ff;stroke-width:3;stroke-dasharray:8 8}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#39e6ff"/></marker></defs>
<rect class="bg" width="1200" height="800"/><rect x="18" y="18" width="1164" height="764" rx="18" fill="none" stroke="#39e6ff" stroke-width="2"/><text x="600" y="58" text-anchor="middle" class="h">CORPORATION SIDE TABLE LAYOUT</text>
<g transform="translate(170 90)"><rect class="panel" width="250" height="575" rx="12"/><text x="125" y="42" text-anchor="middle" class="h">HQ</text><text x="125" y="68" text-anchor="middle" class="s">hand</text><rect class="card" x="85" y="88" width="80" height="112" rx="7"/><circle cx="125" cy="144" r="25" fill="none" stroke="#39e6ff" stroke-width="4"/><rect class="root" x="25" y="220" width="200" height="90" rx="8"/><text x="125" y="247" text-anchor="middle" class="pink">HQ ROOT / UPGRADES</text><rect class="card" x="48" y="258" width="44" height="38" rx="4"/><rect x="105" y="258" width="44" height="38" rx="4" fill="none" stroke="#ff5bc8"/><rect x="162" y="258" width="44" height="38" rx="4" fill="none" stroke="#ff5bc8"/><path class="line" d="M125 310V530"/><g><rect class="ice" x="48" y="330" width="154" height="48" rx="7"/><rect class="ice" x="48" y="397" width="154" height="48" rx="7"/><rect class="ice" x="48" y="464" width="154" height="48" rx="7"/></g><path class="dash" d="M125 512V555" marker-end="url(#arrow)"/></g>
<g transform="translate(475 90)"><rect class="panel" width="250" height="575" rx="12"/><text x="125" y="42" text-anchor="middle" class="h">R&amp;D</text><text x="125" y="68" text-anchor="middle" class="s">draw pile</text><rect class="card" x="85" y="88" width="80" height="112" rx="7"/><circle cx="125" cy="144" r="25" fill="none" stroke="#39e6ff" stroke-width="4"/><rect class="root" x="25" y="220" width="200" height="90" rx="8"/><text x="125" y="247" text-anchor="middle" class="pink">R&amp;D ROOT / UPGRADES</text><rect class="card" x="48" y="258" width="44" height="38" rx="4"/><rect x="105" y="258" width="44" height="38" rx="4" fill="none" stroke="#ff5bc8"/><rect x="162" y="258" width="44" height="38" rx="4" fill="none" stroke="#ff5bc8"/><path class="line" d="M125 310V530"/><rect class="ice" x="48" y="330" width="154" height="48" rx="7"/><rect class="ice" x="48" y="397" width="154" height="48" rx="7"/><rect class="ice" x="48" y="464" width="154" height="48" rx="7"/><path class="dash" d="M125 512V555" marker-end="url(#arrow)"/></g>
<g transform="translate(780 90)"><rect class="panel" width="250" height="575" rx="12"/><text x="125" y="42" text-anchor="middle" class="h">ARCHIVES</text><text x="125" y="68" text-anchor="middle" class="s">discard pile</text><rect class="card" x="85" y="88" width="80" height="112" rx="7"/><circle cx="125" cy="144" r="25" fill="none" stroke="#39e6ff" stroke-width="4"/><rect class="root" x="25" y="220" width="200" height="90" rx="8"/><text x="125" y="247" text-anchor="middle" class="pink">ARCHIVES ROOT / UPGRADES</text><rect class="card" x="48" y="258" width="44" height="38" rx="4"/><rect x="105" y="258" width="44" height="38" rx="4" fill="none" stroke="#ff5bc8"/><rect x="162" y="258" width="44" height="38" rx="4" fill="none" stroke="#ff5bc8"/><path class="line" d="M125 310V530"/><rect class="ice" x="48" y="330" width="154" height="48" rx="7"/><rect class="ice" x="48" y="397" width="154" height="48" rx="7"/><rect class="ice" x="48" y="464" width="154" height="48" rx="7"/><path class="dash" d="M125 512V555" marker-end="url(#arrow)"/></g>
<text x="65" y="440" class="s">INNERMOST ICE</text><text x="65" y="462" class="m">nearest server</text><text x="65" y="572" class="s">OUTERMOST ICE</text><text x="65" y="594" class="m">nearest Runner;</text><text x="65" y="614" class="m">encountered first</text><rect x="260" y="690" width="680" height="66" rx="12" class="panel"/><text x="600" y="735" text-anchor="middle" class="h">RUNNER</text>
</svg>