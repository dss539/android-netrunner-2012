<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Runner-side table layout</title><desc id="desc">Stack, Identity, Heap, and an installed rig divided into Programs, Hardware, and Resources, with areas for credits, tags, counters, scored agendas, and memory.</desc><defs><style>.bg{fill:#071019}.panel{fill:#0d1823;stroke:#39e6ff;stroke-width:2}.rig{fill:#151222;stroke:#ff5bc8;stroke-width:2}.card{fill:#102536;stroke:#baf7ff;stroke-width:2}.h{fill:#edf8ff;font:900 34px system-ui,sans-serif}.t{fill:#edf8ff;font:700 24px system-ui,sans-serif}.s{fill:#39e6ff;font:700 18px system-ui,sans-serif}.m{fill:#a9c0ce;font:17px system-ui,sans-serif}.p{fill:#ff5bc8;font:800 22px system-ui,sans-serif}</style></defs><rect class="bg" width="1200" height="760"/><rect x="18" y="18" width="1164" height="724" rx="18" fill="none" stroke="#39e6ff" stroke-width="2"/><text x="600" y="58" text-anchor="middle" class="h">RUNNER SIDE TABLE LAYOUT</text><g transform="translate(55 90)"><rect class="panel" width="245" height="190" rx="12"/><text x="122" y="42" text-anchor="middle" class="t">STACK</text><text x="122" y="67" text-anchor="middle" class="s">draw pile</text><rect class="card" x="82" y="82" width="80" height="96" rx="7"/></g><g transform="translate(330 90)"><rect class="panel" width="245" height="190" rx="12"/><text x="122" y="42" text-anchor="middle" class="t">IDENTITY</text><rect class="card" x="66" y="75" width="112" height="92" rx="7"/><circle cx="105" cy="110" r="17" fill="#39e6ff"/><path d="M82 150c7-22 47-22 54 0" fill="#39e6ff"/></g><g transform="translate(605 90)"><rect class="panel" width="245" height="190" rx="12"/><text x="122" y="42" text-anchor="middle" class="t">HEAP</text><text x="122" y="67" text-anchor="middle" class="s">discard pile</text><rect class="card" x="82" y="82" width="80" height="96" rx="7"/></g><rect class="rig" x="55" y="315" width="795" height="340" rx="14"/><text x="452" y="355" text-anchor="middle" class="p">INSTALLED RIG</text><line x1="320" y1="380" x2="320" y2="620" stroke="#ff5bc8"/><line x1="585" y1="380" x2="585" y2="620" stroke="#ff5bc8"/><g><text x="187" y="405" text-anchor="middle" class="t">PROGRAMS</text><rect class="card" x="100" y="445" width="78" height="112" rx="6"/><rect class="card" x="145" y="460" width="78" height="112" rx="6"/><rect class="card" x="190" y="475" width="78" height="112" rx="6"/></g><g><text x="452" y="405" text-anchor="middle" class="t">HARDWARE</text><rect class="card" x="365" y="445" width="78" height="112" rx="6"/><rect class="card" x="410" y="460" width="78" height="112" rx="6"/><rect class="card" x="455" y="475" width="78" height="112" rx="6"/></g><g><text x="717" y="405" text-anchor="middle" class="t">RESOURCES</text><rect class="card" x="630" y="445" width="78" height="112" rx="6"/><rect class="card" x="675" y="460" width="78" height="112" rx="6"/><rect class="card" x="720" y="475" width="78" height="112" rx="6"/></g><g transform="translate(880 90)"><rect class="panel" width="265" height="565" rx="14"/><text x="132" y="42" text-anchor="middle" class="s">RUNNER ZONES</text><text x="28" y="88" class="t">Credits / tags / counters</text><line x1="25" y1="110" x2="240" y2="110" stroke="#294150"/><text x="28" y="155" class="t">Scored agendas</text><line x1="25" y1="178" x2="240" y2="178" stroke="#294150"/><text x="28" y="224" class="t">Memory units (MU)</text><text x="28" y="253" class="m">normally 4 MU</text><rect x="30" y="275" width="36" height="36" fill="none" stroke="#39e6ff"/><rect x="80" y="275" width="36" height="36" fill="none" stroke="#39e6ff"/><rect x="130" y="275" width="36" height="36" fill="none" stroke="#39e6ff"/><rect x="180" y="275" width="36" height="36" fill="none" stroke="#39e6ff"/><line x1="25" y1="335" x2="240" y2="335" stroke="#294150"/><text x="28" y="382" class="t">Brain-damage counters</text><line x1="25" y1="410" x2="240" y2="410" stroke="#294150"/><text x="28" y="458" class="t">Hosted counters</text><text x="28" y="487" class="m">place them on the card</text><text x="28" y="510" class="m">that hosts them</text></g></svg>